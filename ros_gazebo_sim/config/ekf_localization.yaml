# EKF定位参数 (robot_localization)
frequency: 50

# 里程计输入
odom0: odom
odom0_config: [false, false, false,
               false, false, false,
               true,  true,  false,
               false, false, true,
               false, false, false]
odom0_differential: false

# IMU输入
