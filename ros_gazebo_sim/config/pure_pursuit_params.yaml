# 纯追踪控制器参数
fixed_lookahead: 5.0         # 固定前视距离 m
adaptive_lookahead: true     # 是否启用自适应
min_lookahead: 3.0           # 最小前视距离 m
max_lookahead: 10.0          # 最大前视距离 m
lookahead_gain: 2.0          # 速度前视增益
wheelbase: 1.2               # 轴距 m
max_linear_vel: 2.0          # 最大线速度 m/s
max_angular_vel: 0.8         # 最大角速度 rad/s
linear_kp: 0.5               # 线速度比例系数
goal_tolerance: 1.0          # 目标容忍距离 m